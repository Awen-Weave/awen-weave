[pytest]
# pytest configuration for the Dolgellau Town Dataset test suite.
#
# testpaths   — only the tests/ tree is collected; src/ is library code.
# pythonpath  — sources live under src/ and client/, so `from craidd.schema
#               import ...` and `from craidd_client import ...` resolve in
#               tests without installation. Mirrors the runtime PYTHONPATH
#               used by the CLIs and BRA.
# addopts     — quieter default; show one line per test, short tracebacks,
#               and fail fast on collection errors.

testpaths = tests
pythonpath = src client
addopts = -q --tb=short
